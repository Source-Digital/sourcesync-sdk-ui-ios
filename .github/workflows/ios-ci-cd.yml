name: iOS CI/CD with CocoaPods

on:
  push:
    branches: [ main, dev, cicd ]
  pull_request:
    branches: [ main, dev ]
  release:
    types: [published]

env:
  DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer

jobs:
  test:
    name: Test iOS SDK
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Cache CocoaPods
      uses: actions/cache@v4
      with:
        path: |
          Pods
          ~/.cocoapods/repos
        key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-
          
    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod --version
        
    - name: Install Dependencies
      run: |
        if [ -f "Podfile" ]; then
          echo "Installing pod dependencies..."
          pod install --repo-update
        else
          echo "No Podfile found - project doesn't use CocoaPods dependencies"
        fi
        
    - name: List Available Schemes
      run: |
        echo "Listing all available schemes..."
        if [ -f "sourcesync-sdk-ui-ios.xcworkspace" ]; then
          echo "Using workspace file"
          xcodebuild -workspace sourcesync-sdk-ui-ios.xcworkspace -list
        elif [ -f "sourcesync-sdk-ui-ios.xcodeproj" ]; then
          echo "Using project file"
          xcodebuild -project sourcesync-sdk-ui-ios.xcodeproj -list
        else
          echo "Error: No workspace or project file found"
          exit 1
        fi
        
    - name: Detect Scheme Name
      id: detect_scheme
      run: |
        # List schemes and try to find the correct one
        if [ -f "sourcesync-sdk-ui-ios.xcworkspace" ]; then
          SCHEMES=$(xcodebuild -workspace sourcesync-sdk-ui-ios.xcworkspace -list | grep -A 100 "Schemes:" | grep -v "Schemes:" | sed 's/^[[:space:]]*//' | head -20)
        elif [ -f "sourcesync-sdk-ui-ios.xcodeproj" ]; then
          SCHEMES=$(xcodebuild -project sourcesync-sdk-ui-ios.xcodeproj -list | grep -A 100 "Schemes:" | grep -v "Schemes:" | sed 's/^[[:space:]]*//' | head -20)
        else
          echo "Error: No workspace or project file found"
          exit 1
        fi
        
        echo "Available schemes:"
        echo "$SCHEMES"
        
        # Try to find a scheme that contains "SourceSync" or "SDK"
        SCHEME_NAME=$(echo "$SCHEMES" | grep -i "sourcesync\|sdk" | head -1 | xargs)
        
        if [ -z "$SCHEME_NAME" ]; then
          # If no SDK scheme found, use the first available scheme
          SCHEME_NAME=$(echo "$SCHEMES" | head -1 | xargs)
        fi
        
        echo "Selected scheme: $SCHEME_NAME"
        echo "scheme_name=$SCHEME_NAME" >> $GITHUB_OUTPUT
        
    - name: Validate Podspec
      run: |
        echo "Validating podspec..."
        # Use the correct podspec file name from your project structure
        if [ -f "SourceSyncSDK.podspec" ]; then
          pod lib lint SourceSyncSDK.podspec --allow-warnings --quick
        elif [ -f "SourceSyncSDK/SourceSyncSDK.podspec" ]; then
          pod lib lint SourceSyncSDK/SourceSyncSDK.podspec --allow-warnings --quick
        else
          echo "Error: SourceSyncSDK.podspec not found"
          exit 1
        fi
        
    - name: Build Framework
      run: |
        SCHEME_NAME="${{ steps.detect_scheme.outputs.scheme_name }}"
        echo "Building iOS framework with scheme: $SCHEME_NAME"
        
        # Check if workspace exists, otherwise use project file
        if [ -f "sourcesync-sdk-ui-ios.xcworkspace" ]; then
          echo "Using workspace file"
          xcodebuild clean build \
            -workspace sourcesync-sdk-ui-ios.xcworkspace \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        elif [ -f "sourcesync-sdk-ui-ios.xcodeproj" ]; then
          echo "Using project file"
          xcodebuild clean build \
            -project sourcesync-sdk-ui-ios.xcodeproj \
            -scheme "$SCHEME_NAME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        else
          echo "Error: No workspace or project file found"
          exit 1
        fi

  publish-cocoapods:
    name: Publish SourceSyncSDK to CocoaPods
    runs-on: macos-14
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod --version
        
    - name: Get Release Version
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${VERSION#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"
        
    - name: Update Podspec Version
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        echo "Updating podspec version to $VERSION"
        
        # Find the correct podspec file location
        if [ -f "SourceSyncSDK.podspec" ]; then
          PODSPEC_FILE="SourceSyncSDK.podspec"
        elif [ -f "SourceSyncSDK/SourceSyncSDK.podspec" ]; then
          PODSPEC_FILE="SourceSyncSDK/SourceSyncSDK.podspec"
        else
          echo "Error: SourceSyncSDK.podspec not found"
          exit 1
        fi
        
        echo "Updating podspec file: $PODSPEC_FILE"
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          sed -i '' "s/spec\.version[[:space:]]*=[[:space:]]*['\"][^'\"]*['\"]/spec.version = \"$VERSION\"/" "$PODSPEC_FILE"
        else
          sed -i "s/spec\.version[[:space:]]*=[[:space:]]*['\"][^'\"]*['\"]/spec.version = \"$VERSION\"/" "$PODSPEC_FILE"
        fi
        
        echo "Updated podspec content:"
        grep "spec.version" "$PODSPEC_FILE"
        
    - name: Install Dependencies for Validation
      run: |
        if [ -f "Podfile" ]; then
          echo "Installing pod dependencies for validation..."
          pod install --repo-update
        else
          echo "No Podfile found - skipping pod install for validation"
        fi
        
    - name: Validate Updated Podspec
      run: |
        echo "Validating updated podspec before publishing..."
        # Find the correct podspec file location
        if [ -f "SourceSyncSDK.podspec" ]; then
          pod spec lint SourceSyncSDK.podspec --allow-warnings --verbose
        elif [ -f "SourceSyncSDK/SourceSyncSDK.podspec" ]; then
          pod spec lint SourceSyncSDK/SourceSyncSDK.podspec --allow-warnings --verbose
        else
          echo "Error: SourceSyncSDK.podspec not found"
          exit 1
        fi
        
    - name: Setup CocoaPods Trunk Authentication
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      run: |
        echo "Setting up CocoaPods trunk authentication..."
        if [ -n "$COCOAPODS_TRUNK_TOKEN" ]; then
          echo "Using COCOAPODS_TRUNK_TOKEN for authentication"
        else
          echo "Error: COCOAPODS_TRUNK_TOKEN not found"
          exit 1
        fi
        
    - name: Publish to CocoaPods
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      run: |
        echo "Publishing SourceSyncSDK to CocoaPods..."
        # Find the correct podspec file location
        if [ -f "SourceSyncSDK.podspec" ]; then
          pod trunk push SourceSyncSDK.podspec --allow-warnings --verbose
        elif [ -f "SourceSyncSDK/SourceSyncSDK.podspec" ]; then
          pod trunk push SourceSyncSDK/SourceSyncSDK.podspec --allow-warnings --verbose
        else
          echo "Error: SourceSyncSDK.podspec not found"
          exit 1
        fi
        
    - name: Verify Publication
      run: |
        echo "Waiting for CocoaPods to process the publication..."
        sleep 60
        echo "Attempting to search for the published pod..."
        pod search SourceSyncSDK || echo "Pod search failed, but this is expected immediately after publishing"
