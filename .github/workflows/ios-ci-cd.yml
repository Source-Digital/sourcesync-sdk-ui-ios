name: Publish SourceSyncSDK to CocoaPods

on:
  push:
    branches: [ main, dev, cicd ]  # Remove these lines once testing is complete
  release:
    types: [published]

env:
  DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer

jobs:
  publish-cocoapods:
    name: Publish SourceSyncSDK to CocoaPods
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod --version
        
    - name: Get Release Version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          # For actual releases, use the tag
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "Using release tag version: $VERSION"
        else
          # For testing (push events), use a test version
          VERSION="0.0.1-test-$(date +%s)"
          echo "Using test version: $VERSION"
          echo "⚠️  THIS IS A TEST RUN - NOT PUBLISHING TO COCOAPODS"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Find and Update Podspec Version
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        echo "Updating podspec version to $VERSION"
        
        # Find the podspec file
        PODSPEC_FILE=$(find . -name "SourceSyncSDK.podspec" | head -1)
        
        if [ -z "$PODSPEC_FILE" ]; then
          echo "Error: SourceSyncSDK.podspec not found"
          exit 1
        fi
        
        echo "Found podspec file: $PODSPEC_FILE"
        
        # Update version in podspec
        sed -i '' "s/spec\.version[[:space:]]*=[[:space:]]*['\"][^'\"]*['\"]/spec.version = \"$VERSION\"/" "$PODSPEC_FILE"
        
        echo "Updated podspec content:"
        grep "spec.version" "$PODSPEC_FILE"
        
    - name: Validate Podspec
      run: |
        # Find the podspec file
        PODSPEC_FILE=$(find . -name "SourceSyncSDK.podspec" | head -1)
        echo "Validating podspec: $PODSPEC_FILE"
        pod spec lint "$PODSPEC_FILE" --allow-warnings --verbose
        
    - name: Setup CocoaPods Trunk Authentication
      if: github.event_name == 'release'
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      run: |
        echo "Setting up CocoaPods trunk authentication..."
        if [ -n "$COCOAPODS_TRUNK_TOKEN" ]; then
          echo "Using COCOAPODS_TRUNK_TOKEN for authentication"
        else
          echo "Error: COCOAPODS_TRUNK_TOKEN not found"
          exit 1
        fi
        
    - name: Publish to CocoaPods
      if: github.event_name == 'release'
      env:
        COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
      run: |
        # Find the podspec file
        PODSPEC_FILE=$(find . -name "SourceSyncSDK.podspec" | head -1)
        echo "Publishing podspec: $PODSPEC_FILE"
        pod trunk push "$PODSPEC_FILE" --allow-warnings --verbose
        
    - name: Test Run Complete
      if: github.event_name != 'release'
      run: |
        echo "🧪 TEST RUN COMPLETED SUCCESSFULLY!"
        echo ""
        echo "✅ Podspec found and validated with current version"
        echo "✅ No version changes made during testing"
        echo ""
        echo "To publish for real:"
        echo "1. Remove the 'push:' trigger from the workflow"
        echo "2. Create a GitHub release with a version tag (e.g., v1.0.0)"
        echo "3. The workflow will automatically:"
        echo "   - Update podspec version to match the release tag"
        echo "   - Publish to CocoaPods"
        
    - name: Verify Publication
      if: github.event_name == 'release'
      run: |
        echo "Waiting for CocoaPods to process the publication..."
        sleep 30
        echo "Publication completed successfully!"
        echo "Your SDK should be available at: https://cocoapods.org/pods/SourceSyncSDK"
