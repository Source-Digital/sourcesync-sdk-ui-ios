name: SourceSyncSDK
options:
  bundleIdPrefix: com.sourcedigital
  deploymentTarget:
    iOS: "13.0"

targets:
  SourceSyncSDK:
    type: framework
    platform: iOS
    sources:
      - path: Sources
        excludes: 
          - "**/*.md"
          - "**/Package.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sourcedigital.sourcesync
        SWIFT_VERSION: "5.7"
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Sources/SourceSyncSDK/Info.plist
        FRAMEWORK_SEARCH_PATHS: $(inherited)
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
        VALID_ARCHS: "arm64 x86_64"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""
        
  SourceSyncSDKTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: SourceSyncSDK
    settings:
      BUNDLE_LOADER: $(TEST_HOST)
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/SourceSyncSDK.framework/SourceSyncSDK
